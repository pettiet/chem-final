<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Chemistry Final · Study Hub</title>
  <meta name="description" content="Mobile-first study site for the Spring chem final — 9 modules with randomized quizzes, a cumulative exam, and progress tracking." />

  <!-- Open Graph / iMessage / Slack / Facebook -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Chemistry Final · Study Hub" />
  <meta property="og:description" content="9 modules · cumulative exam · scoring & streaks. Built for Spring 2026." />
  <meta property="og:image"       content="og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Chemistry Final · Study Hub" />
  <meta name="twitter:description" content="9 modules · cumulative exam · scoring & streaks. Built for Spring 2026." />
  <meta name="twitter:image"       content="og-image.png" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="dashboard">
  <div class="wrap">
    <header class="hero">
      <div class="hello">
        <h1 id="greeting">Hey there 👋</h1>
        <span class="streak" id="streak-pill">🔥 0 day streak</span>
      </div>

      <div class="readiness" id="readiness-card">
        <div class="ring-wrap">
          <svg class="ring" id="readiness-ring" width="92" height="92" viewBox="0 0 92 92" aria-hidden="true">
            <circle class="track" cx="46" cy="46" r="40" fill="none" stroke-width="8"/>
            <circle class="arc"   cx="46" cy="46" r="40" fill="none" stroke-width="8"
                    transform="rotate(-90 46 46)"
                    stroke-dasharray="251.327" stroke-dashoffset="251.327"/>
            <text x="46" y="48" id="readiness-pct" font-size="20">0%</text>
          </svg>
        </div>
        <div>
          <div class="label">Final Exam Readiness</div>
          <div class="value" id="readiness-value">0%</div>
          <div class="hint" id="readiness-hint">Average of your best scores</div>
        </div>
      </div>
    </header>

    <div class="section-title">Study Modules</div>
    <div class="module-grid" id="module-grid"></div>

    <div class="cta-wrap">
      <a class="btn" href="exam.html">📝 Take the Cumulative Exam</a>
    </div>

    <div class="section-title" style="margin-top:22px">Badges</div>
    <div id="badges" class="readiness" style="gap:10px; flex-wrap:wrap; font-size:24px;">
      <span class="hint" id="no-badges" style="font-size:13px; color:var(--text-dim)">Earn badges by finishing quizzes.</span>
    </div>

    <div class="spacer"></div>
    <div class="center">
      <button class="btn ghost" id="reset-btn">Reset progress</button>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    AppKit.initDashboard();
  </script>
</body>
</html>
